# POSTGRES
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://myworkouts-postgres:5432/my_workouts}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:webappuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.properties.hibernate.default_schema = public

# Hibernate ddl auto (create, create-drop, update)
spring.jpa.hibernate.ddl-auto = none

# FLYWAY
spring.flyway.locations=classpath:flyway/prod-migration

server.port=8084

# CORS — same-origin in prod (served via nginx proxy); override with env if needed
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://workouts-fe.mira182.synology.me}

# WITHINGS OAUTH
withings.client-id=${WITHINGS_CLIENT_ID}
withings.client-secret=${WITHINGS_CLIENT_SECRET}
withings.redirect-uri=${WITHINGS_REDIRECT_URI:https://workouts-fe.mira182.synology.me/weight}