<div class="flex flex-col">
  <ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-spin" [fullScreen]="true"></ngx-spinner>
  <mat-tab-group (selectedIndexChange)="selectedTab($event)" [selectedIndex]="selectedTabIndex()">
    <mat-tab label="Charts">
      <div class="flex flex-col items-center w-full py-4">
        <mat-button-toggle-group class="range-toggle mb-4" [value]="selectedRangeDays" (change)="onRangeChange($event.value)">
          @for (range of ranges; track range) {
            <mat-button-toggle [value]="range.days">{{ range.label }}</mat-button-toggle>
          }
        </mat-button-toggle-group>

        @for (chart of charts; track chart) {
          <h3 class="chart-title">{{ chart.title }}</h3>
          <app-ngx-line-chart class="w-4/5" [chartData]="viewData()[chart.key]" [showDots]="selectedRangeDays !== 0"
            (pointHovered)="onPointHovered($event)"
          (pointLeft)="onPointLeft()"></app-ngx-line-chart>
        }
      </div>
    </mat-tab>

    <mat-tab label="Tables">
      <app-measurements-table [data]="tableData()" [numericColumns]="numericColumns" [units]="units"></app-measurements-table>
    </mat-tab>

  </mat-tab-group>

  <button mat-fab class="update-fab" color="primary" matTooltip="{{'WEIGHT.update' | translate}}"
    (click)="redirectToWithingsAuthUrl()">
    <mat-icon>update</mat-icon>
  </button>

  @if (tooltip.visible && tooltip.date) {
<div class="day-tooltip top-3 left-1/2 -translate-x-1/2 w-max max-w-[calc(100vw_-_1.5rem)]
            sm:top-[var(--tt-y)] sm:left-[var(--tt-x)] sm:translate-x-0 sm:w-auto sm:max-w-[24rem]"
      [style.--tt-x]="tooltip.x + 'px'" [style.--tt-y]="tooltip.y + 'px'">
      <app-day-details [date]="tooltip.date" [data]="tableData()" [numericColumns]="numericColumns" [units]="units"></app-day-details>
    </div>
  }
</div>
