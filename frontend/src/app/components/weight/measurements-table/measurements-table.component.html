<div class="flex flex-col items-center w-full py-4">
  <div class="table-container w-4/5">
    <table mat-table [dataSource]="dataSource" matSort matSortActive="date" matSortDirection="desc" class="w-full">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'TABLE.date' | translate }}</th>
        <td mat-cell *matCellDef="let m">{{ m.date | date: 'dd.MM.yyyy' }}</td>
      </ng-container>

      @for (col of numericColumns; track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'TABLE.' + col | translate }}</th>
          <td mat-cell *matCellDef="let m">{{ m[col] ? (m[col] | number: '1.1-1') + (units[col] ? ' ' + units[col] : '') : '–' }}</td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="tableColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: tableColumns;"></tr>
    </table>
    <mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
