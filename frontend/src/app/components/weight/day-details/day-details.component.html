<div class="flex flex-col items-center w-full py-4">
  <ng-container *ngIf="date; else hint">
    <h3 class="day-title">{{ date | date: 'dd.MM.yyyy' }}</h3>

    <table class="day-table" *ngIf="dayRows.length; else noData">
      <thead>
      <tr>
        <th>{{ 'DETAILS.metric' | translate }}</th>
        <th *ngFor="let row of dayRows">{{ row.date | date: 'HH:mm' }}</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let col of numericColumns">
        <td class="metric">{{ 'TABLE.' + col | translate }}</td>
        <td *ngFor="let row of dayRows">
          {{ row[col] ? (row[col] | number: '1.1-1') + (units[col] ? ' ' + units[col] : '') : '–' }}
        </td>
      </tr>
      </tbody>
    </table>

    <ng-template #noData>
      <p class="hint">{{ 'DETAILS.no-data' | translate }}</p>
    </ng-template>
  </ng-container>

  <ng-template #hint>
    <p class="hint">{{ 'DETAILS.hint' | translate }}</p>
  </ng-template>
</div>
