<div class="flex justify-center py-3">
  <div class="flex flex-row items-center gap-2">
    <button mat-icon-button color="primary" aria-label="Previous day" (click)="decrementDay()">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-48">
      <mat-label>Select day</mat-label>
      <input matInput [matDatepicker]="picker" [formControl]="dateFormControl" (dateChange)="dateSelected($event)">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker [dateClass]="workoutDateClass"
                      [calendarHeaderComponent]="workoutCalendarHeader"></mat-datepicker>
    </mat-form-field>

    <button mat-icon-button color="primary" aria-label="Next day" (click)="incrementDay()">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
</div>
