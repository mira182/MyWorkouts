<div>
  <mat-form-field>
    <mat-label>{{'TITLES.workouts' | translate}}</mat-label>
    <mat-select [formControl]="selectWorkoutControl" [compareWith]="compareChartTypes" (selectionChange)="updateChart(currentInterval)">
      @for (group of workoutGroups; track group) {
        <mat-optgroup [label]="group.groupName">
          @for (chart of group.charts; track chart) {
            <mat-option [value]="chart">
              {{chart.viewValue}}
            </mat-option>
          }
        </mat-optgroup>
      }
    </mat-select>
  </mat-form-field>

  <app-chips-time-select [interval]="currentInterval" (chipSelected)="updateMonthInterval($event)"></app-chips-time-select>


  <div class="grow flex justify-center max-h-80 m-4">
    <canvas id="workoutChart"  aria-label="Hello ARIA World" role="img"></canvas>
    <ngx-spinner
      bdColor="rgba(51,51,51,0.8)"
      size="medium"
      color="#fff"
      type="ball-spin"
      [fullScreen]="false"
    ></ngx-spinner>
  </div>
</div>
