<app-expansion-panel>
  <div panelTitle class="hyphens-auto">
    {{ exercise.name }}
  </div>

  <div panelDescription>
    {{ exercise.type }}
  </div>

  <div panelContent>
    @if (exerciseHelper.getExerciseImagePath(exercise); as imagePath) {
      <img [ngSrc]="IMAGE_BASE_URL + imagePath"
           width="300" height="200"
           [alt]="exercise.name"
           class="block mx-auto rounded-lg max-w-full object-contain">
    } @else {
      <div class="w-[300px] h-[200px] max-w-full mx-auto rounded-lg grid place-items-center bg-[var(--brand-primary-softer)]">
        <mat-icon class="!w-14 !h-14 !text-[56px] text-[var(--brand-primary)] opacity-40">fitness_center</mat-icon>
      </div>
    }

    <mat-divider></mat-divider>

    <div class="flex flex-row justify-end m-2">
      <button mat-button (click)="editExercise()" color="primary">
        {{ 'BUTTON.edit-exercise' | translate }}
      </button>
      <button mat-button (click)="deleteExercise()" color="primary">
        {{ 'BUTTON.delete-exercise' | translate }}
      </button>
    </div>
  </div>
</app-expansion-panel>
