# greeter-ui/default.conf

server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50M;

  # The service worker and its manifest must never be cached — they are how the
  # PWA discovers a new deployment. A stale ngsw.json means the phone keeps
  # running the old app indefinitely.
  location ~* ^/(ngsw\.json|ngsw-worker\.js|safety-worker\.js|worker-basic\.min\.js)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
  }

  # index.html is the entry point; always revalidate so a new build is picked up.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
  }

  # Build output is content-hashed, so it can be cached hard and forever.
  location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/v1 {
    proxy_pass http://myworkouts-backend:8084;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Exercise images served directly from the shared img volume (read-only mount)
  location /img/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }
}
